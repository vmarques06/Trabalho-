<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a3b5d">
    <title>Floorshare - Linha Branca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f0f4f8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @page { size: A4; margin: 0; }
        .category-badge {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border: 1px solid #d1d5db;
        }
        .category-badge.mda { border-left: 3px solid #1a3b5d; }
        .category-badge.sda { border-left: 3px solid #10b981; }
        .pdf-header {
            background: linear-gradient(135deg, #1a3b5d 0%, #0f2440 100%);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .electrolux-primary { color: #1a3b5d; }
        .electrolux-bg { background-color: #1a3b5d; }
        .electrolux-border { border-color: #1a3b5d; }
        .electrolux-light { background-color: #e6edf5; }
        .mda-badge { background-color: #1a3b5d; color: white; }
        .sda-badge { background-color: #10b981; color: white; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <header class="electrolux-bg text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-blue-300"></i>
            <h1 class="text-lg font-bold tracking-wide">Floorshare</h1>
        </div>
        <button id="reset-top" class="text-xs bg-blue-900 hover:bg-blue-800 px-3 py-1 rounded-full transition">
            <i class="fas fa-eraser mr-1"></i> Limpar
        </button>
    </header>

    <div class="container mx-auto p-4 max-w-md">
        
        <div class="bg-blue-50 border-l-4 electrolux-border p-3 rounded-r mb-4 shadow-sm">
            <p class="text-blue-900 text-xs font-bold uppercase tracking-wider mb-1">Floorshare Linha Branca</p>
            <h2 class="text-gray-800 font-bold text-sm">Controle de Participação por Marca</h2>
        </div>

        <div class="space-y-4">
            
            <!-- SEÇÃO REDE + DATA (Equipe removida) -->
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-3 flex items-center">
                    <i class="fas fa-store mr-2"></i> Rede
                </h3>
                <div class="space-y-3">
                    <input type="text" id="rede" placeholder="Rede" class="w-full bg-gray-50 p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="id-rede" placeholder="ID" class="w-full bg-gray-50 p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition">
                        <input type="text" id="filial" placeholder="Filial" class="w-full bg-gray-50 p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition">
                    </div>
                    <input type="text" id="cidade" placeholder="Cidade" class="w-full bg-gray-50 p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition">
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-400 text-xs">Data</span>
                        <input type="date" id="data" class="w-full bg-gray-50 pt-6 pb-2 px-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition">
                    </div>
                </div>
            </div>

            <!-- SEÇÃO DE CONFIGURAÇÃO DE CATEGORIAS -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-3 flex items-center">
                    <i class="fas fa-cog mr-2"></i> Configurar Categorias
                </h3>
                
                <!-- MDA - Categorias editáveis -->
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="mda-badge text-xs font-bold px-2 py-1 rounded">MDA</span>
                        <span class="text-xs text-gray-500">(até 5 categorias)</span>
                    </div>
                    <div id="mda-categories" class="space-y-2">
                        <!-- Categorias MDA pré-definidas -->
                    </div>
                    <button type="button" id="add-mda-category" class="w-full mt-2 py-2 border border-dashed border-gray-300 text-gray-500 rounded-lg hover:bg-gray-50 hover:border-blue-400 hover:text-blue-500 transition text-xs flex items-center justify-center gap-1">
                        <i class="fas fa-plus text-xs"></i> Adicionar categoria MDA
                    </button>
                </div>
                
                <!-- SDA - Categorias editáveis -->
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="sda-badge text-xs font-bold px-2 py-1 rounded">SDA</span>
                        <span class="text-xs text-gray-500">(até 5 categorias)</span>
                    </div>
                    <div id="sda-categories" class="space-y-2">
                        <!-- Categorias SDA pré-definidas -->
                    </div>
                    <button type="button" id="add-sda-category" class="w-full mt-2 py-2 border border-dashed border-gray-300 text-gray-500 rounded-lg hover:bg-gray-50 hover:border-blue-400 hover:text-blue-500 transition text-xs flex items-center justify-center gap-1">
                        <i class="fas fa-plus text-xs"></i> Adicionar categoria SDA
                    </button>
                </div>
                
                <button type="button" id="apply-categories" class="w-full mt-4 bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition text-sm">
                    <i class="fas fa-sync-alt mr-2"></i> Atualizar Categorias
                </button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border-2 electrolux-border">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="electrolux-primary font-bold text-lg">Contagem por Categoria</h3>
                    <div class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">
                        Electrolux primeiro
                    </div>
                </div>
                
                <div class="space-y-4" id="brands-container">
                    <!-- Electrolux fixo no topo -->
                    <div class="brand-category electrolux-light border electrolux-border rounded-xl p-4">
                        <div class="flex items-center mb-3">
                            <div class="relative w-full">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-crown electrolux-primary"></i>
                                </div>
                                <input type="text" value="Electrolux" readonly class="w-full pl-9 pr-3 py-3 bg-transparent rounded-xl border-none text-gray-700 font-bold electrolux-primary">
                            </div>
                        </div>
                        
                        <div id="electrolux-categories" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2">
                            <!-- Categorias serão geradas dinamicamente -->
                        </div>
                        <div class="text-xs text-gray-400 text-center mt-1">
                            <i class="fas fa-info-circle mr-1"></i>Marca principal
                        </div>
                    </div>
                    
                    <!-- Outras marcas serão adicionadas aqui -->
                </div>
                
                <button type="button" id="add-brand" class="w-full mt-4 py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:bg-gray-50 hover:border-blue-400 hover:text-blue-500 transition flex items-center justify-center gap-2 font-medium">
                    <i class="fas fa-plus"></i> Adicionar Marca Concorrente
                </button>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-3 flex items-center">
                    <i class="fas fa-info-circle mr-2"></i> Observações
                </h3>
                <textarea id="observacoes" placeholder="Observações adicionais..." rows="2" class="w-full bg-gray-50 p-3 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-gray-700 text-sm transition resize-none"></textarea>
            </div>
        </div>
        
        <div class="h-8"></div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl shadow-2xl transform transition-transform duration-300 max-h-[90vh] flex flex-col">
            
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl">
                <h3 class="font-bold text-gray-800">Relatório Gerado</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700 bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="p-4 overflow-y-auto no-scrollbar">
                <div class="mb-4">
                    <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">Resumo por Marca</h4>
                    <div id="visual-summary" class="bg-gray-50 rounded-xl p-3 text-sm space-y-3"></div>
                </div>

                <div>
                    <h4 class="text-xs font-bold text-gray-400 uppercase mb-2">Relatório Completo</h4>
                    <div id="pdf-preview" class="whitespace-pre-wrap text-xs bg-gray-50 text-gray-900 p-4 rounded-xl border border-gray-200 font-mono max-h-60 overflow-y-auto"></div>
                </div>
            </div>

            <div class="p-4 border-t bg-white flex gap-3">
                <button id="generate-pdf" class="flex-1 electrolux-bg text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-blue-900 transition flex items-center justify-center gap-2">
                    <i class="fas fa-file-pdf"></i> Gerar PDF
                </button>
                <a id="whatsapp-link" href="#" target="_blank" class="flex-1 bg-green-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-green-600 transition flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp text-xl"></i> WhatsApp
                </a>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-40">
        <div class="max-w-md mx-auto">
            <button id="generate-report" class="w-full electrolux-bg text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-900 active:scale-95 transition flex items-center justify-center gap-2">
                <i class="fas fa-chart-bar mr-2"></i> Gerar Relatório
            </button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        document.getElementById('data').valueAsDate = new Date();

        // Estado das categorias (editável)
        let categoriasMDA = [
            { nome: 'Refrigerador', key: 'refrigerador' },
            { nome: 'Fogão', key: 'fogao' },
            { nome: 'Lavadora', key: 'lavadora' },
            { nome: 'Microondas', key: 'microondas' }
        ];
        
        let categoriasSDA = [
            { nome: 'Airfryer', key: 'airfryer' },
            { nome: 'Aspirador', key: 'aspirador' }
        ];

        // Função para normalizar chave (remover acentos, espaços, etc)
        function normalizarChave(nome) {
            return nome.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]/g, '')
                .substring(0, 20);
        }

        // Renderizar categorias na seção de configuração
        function renderizarConfigCategorias() {
            const mdaContainer = document.getElementById('mda-categories');
            const sdaContainer = document.getElementById('sda-categories');
            
            mdaContainer.innerHTML = categoriasMDA.map((cat, index) => `
                <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg">
                    <input type="text" value="${cat.nome}" 
                           class="mda-category-name flex-1 bg-white border border-gray-300 rounded px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
                           data-index="${index}" data-tipo="mda">
                    <button type="button" class="remove-category text-red-400 hover:text-red-600 p-1" data-index="${index}" data-tipo="mda">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
            
            sdaContainer.innerHTML = categoriasSDA.map((cat, index) => `
                <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg">
                    <input type="text" value="${cat.nome}" 
                           class="sda-category-name flex-1 bg-white border border-gray-300 rounded px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
                           data-index="${index}" data-tipo="sda">
                    <button type="button" class="remove-category text-red-400 hover:text-red-600 p-1" data-index="${index}" data-tipo="sda">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        // Adicionar categoria MDA
        document.getElementById('add-mda-category').addEventListener('click', () => {
            if (categoriasMDA.length >= 5) {
                alert('Máximo de 5 categorias MDA atingido.');
                return;
            }
            categoriasMDA.push({ nome: 'Nova MDA', key: '' });
            renderizarConfigCategorias();
        });

        // Adicionar categoria SDA
        document.getElementById('add-sda-category').addEventListener('click', () => {
            if (categoriasSDA.length >= 5) {
                alert('Máximo de 5 categorias SDA atingido.');
                return;
            }
            categoriasSDA.push({ nome: 'Nova SDA', key: '' });
            renderizarConfigCategorias();
        });

        // Remover categoria
        document.addEventListener('click', (e) => {
            if (e.target.closest('.remove-category')) {
                const btn = e.target.closest('.remove-category');
                const index = parseInt(btn.dataset.index);
                const tipo = btn.dataset.tipo;
                
                if (tipo === 'mda') {
                    if (categoriasMDA.length <= 1) {
                        alert('É necessário pelo menos 1 categoria MDA.');
                        return;
                    }
                    categoriasMDA.splice(index, 1);
                } else {
                    if (categoriasSDA.length <= 1) {
                        alert('É necessário pelo menos 1 categoria SDA.');
                        return;
                    }
                    categoriasSDA.splice(index, 1);
                }
                renderizarConfigCategorias();
            }
        });

        // Atualizar nomes das categorias ao digitar
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('mda-category-name')) {
                const index = parseInt(e.target.dataset.index);
                categoriasMDA[index].nome = e.target.value;
            } else if (e.target.classList.contains('sda-category-name')) {
                const index = parseInt(e.target.dataset.index);
                categoriasSDA[index].nome = e.target.value;
            }
        });

        // Aplicar categorias e recriar os campos
        document.getElementById('apply-categories').addEventListener('click', () => {
            categoriasMDA.forEach(cat => {
                cat.key = normalizarChave(cat.nome) || `mda_${Date.now()}`;
            });
            categoriasSDA.forEach(cat => {
                cat.key = normalizarChave(cat.nome) || `sda_${Date.now()}`;
            });
            
            renderizarCategoriasElectrolux();
            
            document.querySelectorAll('.competitor-categories-container').forEach(container => {
                renderizarCategoriasConcorrente(container);
            });
            
            alert('Categorias atualizadas com sucesso!');
        });

        // Renderizar categorias na Electrolux
        function renderizarCategoriasElectrolux() {
            const container = document.getElementById('electrolux-categories');
            let html = '';
            
            categoriasMDA.forEach(cat => {
                html += `
                    <div class="category-badge mda rounded-lg p-3 text-center">
                        <label class="text-xs text-gray-500 font-medium mb-1 block">${cat.nome}</label>
                        <input type="number" data-marca="Electrolux" data-categoria="${cat.key}" data-tipo="mda" placeholder="0" 
                               class="w-full text-center bg-transparent border-none text-lg font-bold text-gray-700 focus:outline-none" 
                               inputmode="numeric" min="0">
                    </div>
                `;
            });
            
            categoriasSDA.forEach(cat => {
                html += `
                    <div class="category-badge sda rounded-lg p-3 text-center">
                        <label class="text-xs text-gray-500 font-medium mb-1 block">${cat.nome}</label>
                        <input type="number" data-marca="Electrolux" data-categoria="${cat.key}" data-tipo="sda" placeholder="0" 
                               class="w-full text-center bg-transparent border-none text-lg font-bold text-gray-700 focus:outline-none" 
                               inputmode="numeric" min="0">
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Renderizar categorias para marcas concorrentes
        function renderizarCategoriasConcorrente(container) {
            let html = '';
            
            categoriasMDA.forEach(cat => {
                html += `
                    <div class="category-badge mda rounded-lg p-3 text-center">
                        <label class="text-xs text-gray-500 font-medium mb-1 block">${cat.nome}</label>
                        <input type="number" data-categoria="${cat.key}" data-tipo="mda" placeholder="0" 
                               class="quantity-input w-full text-center bg-transparent border-none text-lg font-bold text-gray-700 focus:outline-none" 
                               inputmode="numeric" min="0">
                    </div>
                `;
            });
            
            categoriasSDA.forEach(cat => {
                html += `
                    <div class="category-badge sda rounded-lg p-3 text-center">
                        <label class="text-xs text-gray-500 font-medium mb-1 block">${cat.nome}</label>
                        <input type="number" data-categoria="${cat.key}" data-tipo="sda" placeholder="0" 
                               class="quantity-input w-full text-center bg-transparent border-none text-lg font-bold text-gray-700 focus:outline-none" 
                               inputmode="numeric" min="0">
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Template para marcas concorrentes
        const competitorTemplate = () => {
            const currentInputs = document.querySelectorAll('.brand-name');
            const nextIndex = currentInputs.length;
            
            return `
                <div class="brand-category bg-white border border-gray-200 rounded-xl p-4 relative shadow-sm">
                    <button type="button" class="remove-brand absolute top-2 right-2 text-gray-400 hover:text-red-600 p-1 z-10">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="flex items-center mb-3">
                        <div class="relative w-full">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-tag text-gray-400"></i>
                            </div>
                            <input type="text" class="brand-name w-full pl-9 pr-3 py-3 bg-gray-50 rounded-xl border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition text-gray-700" 
                                   placeholder="Digite o nome da marca" value="Marca ${nextIndex}">
                        </div>
                    </div>
                    
                    <div class="competitor-categories-container grid grid-cols-2 sm:grid-cols-3 gap-2">
                        <!-- Categorias renderizadas dinamicamente -->
                    </div>
                </div>
            `;
        };

        // Adicionar marca concorrente
        document.getElementById('add-brand').addEventListener('click', function() {
            const container = document.getElementById('brands-container');
            const newBrand = document.createElement('div');
            newBrand.className = 'animate-fade-in mb-4';
            newBrand.innerHTML = competitorTemplate();
            container.appendChild(newBrand);
            
            const catContainer = newBrand.querySelector('.competitor-categories-container');
            renderizarCategoriasConcorrente(catContainer);
            
            const newInput = newBrand.querySelector('.brand-name');
            if(newInput) newInput.select();
        });

        // Remover marca
        document.getElementById('brands-container').addEventListener('click', function(e) {
            const btnRemove = e.target.closest('.remove-brand');
            if (btnRemove) {
                const brandWrapper = btnRemove.closest('.animate-fade-in');
                if (brandWrapper) {
                    brandWrapper.remove();
                } else {
                    const brandDiv = btnRemove.closest('.brand-category');
                    if (brandDiv) brandDiv.remove();
                }
            }
        });

        // Coleta de dados
        function coletarDadosMarcas() {
            const brandsData = {};
            const allCategories = document.querySelectorAll('.brand-category');
            
            const todasCategorias = [...categoriasMDA, ...categoriasSDA];
            
            allCategories.forEach(div => {
                let brandName = '';
                
                const fixedInput = div.querySelector('input[value="Electrolux"]');
                const editableInput = div.querySelector('.brand-name');
                
                if (fixedInput) {
                    brandName = 'Electrolux';
                } else if (editableInput) {
                    brandName = editableInput.value.trim();
                    if (!brandName) return;
                    if (brandsData[brandName]) {
                        brandName = brandName + " (2)";
                    }
                }
                
                if (!brandName) return;

                const data = { total: 0 };
                
                todasCategorias.forEach(cat => {
                    const input = div.querySelector(`[data-categoria="${cat.key}"]`);
                    const valor = parseInt(input?.value) || 0;
                    data[cat.key] = valor;
                    data.total += valor;
                });
                
                brandsData[brandName] = data;
            });
            
            Object.keys(brandsData).forEach(marca => {
                if (marca !== 'Electrolux' && brandsData[marca].total === 0) {
                    delete brandsData[marca];
                }
            });
            
            return brandsData;
        }

        // Totais
        function calcularTotais(brandsData) {
            const todasCategorias = [...categoriasMDA, ...categoriasSDA];
            const totais = { totalGeral: 0 };
            
            todasCategorias.forEach(cat => {
                totais[cat.key] = 0;
            });
            
            Object.values(brandsData).forEach(data => {
                totais.totalGeral += data.total;
                todasCategorias.forEach(cat => {
                    totais[cat.key] += (data[cat.key] || 0);
                });
            });
            
            return totais;
        }

        function calcularPorcentagem(valor, total) {
            return total > 0 ? Math.round((valor / total) * 100) : 0;
        }

        function formatarData(dataString) {
            if (!dataString) return new Date().toLocaleDateString('pt-BR');
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // Resumo Visual
        function gerarResumoVisual(brandsData, totais) {
            let html = '';
            const todasCategorias = [...categoriasMDA, ...categoriasSDA];
            
            const marcasOrdenadas = Object.entries(brandsData)
                .sort(([nomeA, dataA], [nomeB, dataB]) => {
                    if (nomeA.toUpperCase() === 'ELECTROLUX') return -1;
                    if (nomeB.toUpperCase() === 'ELECTROLUX') return 1;
                    return dataB.total - dataA.total;
                });
            
            marcasOrdenadas.forEach(([marca, data]) => {
                const isElectrolux = marca.toUpperCase() === 'ELECTROLUX';
                const pctTotal = calcularPorcentagem(data.total, totais.totalGeral);
                
                html += `
                    <div class="${isElectrolux ? 'electrolux-light border-l-4 electrolux-border' : 'bg-white border border-gray-200'} p-3 rounded-lg mb-2 shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold ${isElectrolux ? 'electrolux-primary' : 'text-gray-700'}">${marca}</span>
                            <span class="font-bold electrolux-primary">${pctTotal}%</span>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 text-[10px] sm:text-xs">
                            ${todasCategorias.map(cat => {
                                const pct = calcularPorcentagem(data[cat.key] || 0, totais[cat.key]);
                                return `
                                    <div class="text-center">
                                        <div class="text-gray-500">${cat.nome}</div>
                                        <div class="font-semibold">${data[cat.key] || 0} 
                                            <span class="text-blue-600">(${pct}%)</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            
            html += `
                <div class="mt-3 pt-3 border-t border-gray-300">
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 text-center text-xs">
                        <div>
                            <div class="text-gray-500">Total Geral</div>
                            <div class="font-bold text-sm text-gray-800">${totais.totalGeral}</div>
                        </div>
                        ${todasCategorias.map(cat => `
                            <div>
                                <div class="text-gray-500">${cat.nome}</div>
                                <div class="font-bold text-sm text-blue-600">${totais[cat.key]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            return html;
        }

        // Relatório Texto (atualizado sem campos de equipe)
        function gerarRelatorioTexto(dados, brandsData, totais) {
            let relatorio = `*FLOORSHARE LINHA BRANCA*\n\n`;
            relatorio += `*Rede:* ${dados.rede}\n`;
            if(dados.idRede) relatorio += `*ID:* ${dados.idRede}\n`;
            relatorio += `*Filial:* ${dados.filial}\n`;
            relatorio += `*Cidade:* ${dados.cidade}\n`;
            relatorio += `*Data:* ${dados.data}\n\n`;
            
            if (dados.observacoes) {
                relatorio += `*Obs:* ${dados.observacoes}\n\n`;
            }
            
            relatorio += `*PARTICIPAÇÃO*\n`;
            relatorio += `------------------------------\n`;
            
            const todasCategorias = [...categoriasMDA, ...categoriasSDA];
            
            const marcasOrdenadas = Object.entries(brandsData)
                .sort(([nomeA, dataA], [nomeB, dataB]) => {
                    if (nomeA.toUpperCase() === 'ELECTROLUX') return -1;
                    if (nomeB.toUpperCase() === 'ELECTROLUX') return 1;
                    return dataB.total - dataA.total;
                });
            
            marcasOrdenadas.forEach(([marca, data]) => {
                const pctTotal = calcularPorcentagem(data.total, totais.totalGeral);
                relatorio += `*${marca.toUpperCase()}*: ${pctTotal}% (${data.total} un)\n`;
                todasCategorias.forEach(cat => {
                    if (data[cat.key] > 0) {
                        relatorio += `  ${cat.nome}: ${data[cat.key]}\n`;
                    }
                });
                relatorio += `\n`;
            });
            
            relatorio += `------------------------------\n`;
            relatorio += `*TOTAL GERAL: ${totais.totalGeral}*\n`;
            
            return relatorio;
        }

        // Geração PDF (atualizado sem campos de equipe)
        async function gerarPDF(dados, brandsData, totais) {
            const todasCategorias = [...categoriasMDA, ...categoriasSDA];
            const numColunas = todasCategorias.length + 2;
            const isLandscape = numColunas > 6;
            
            const pdf = new jsPDF(isLandscape ? 'landscape' : 'portrait', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.width;
            
            // Cabeçalho
            pdf.setFillColor(26, 59, 93);
            pdf.rect(0, 0, pageWidth, 30, 'F');
            
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(22);
            pdf.setFont('helvetica', 'bold');
            pdf.text('FLOORSHARE', pageWidth / 2, 14, { align: 'center' });
            
            pdf.setFontSize(12);
            pdf.text('RELATÓRIO DE PARTICIPAÇÃO', pageWidth / 2, 22, { align: 'center' });
            
            let y = 45;
            
            // Dados Gerais (sem equipe)
            pdf.setTextColor(0, 0, 0);
            pdf.setFontSize(10);
            pdf.setFont('helvetica', 'bold');
            pdf.text('DADOS DA REDE', 15, y);
            
            pdf.setDrawColor(200, 200, 200);
            pdf.line(15, y+2, pageWidth-15, y+2);
            y += 8;
            
            pdf.setFont('helvetica', 'normal');
            pdf.text(`Rede: ${dados.rede}`, 15, y);
            pdf.text(`ID: ${dados.idRede}`, 15, y + 6);
            pdf.text(`Filial: ${dados.filial}`, 15, y + 12);
            pdf.text(`Cidade: ${dados.cidade}`, pageWidth/2 + 10, y);
            pdf.text(`Data: ${dados.data}`, pageWidth/2 + 10, y + 6);
            
            y += 25;
            
            if (dados.observacoes) {
                pdf.setFont('helvetica', 'bold');
                pdf.text('OBSERVAÇÕES', 15, y);
                y += 6;
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(9);
                const obs = pdf.splitTextToSize(dados.observacoes, pageWidth - 30);
                pdf.text(obs, 15, y);
                y += (obs.length * 5) + 10;
            }

            // Tabela
            pdf.setFontSize(11);
            pdf.setFont('helvetica', 'bold');
            pdf.text('ANÁLISE DE SHARE', 15, y);
            y += 5;

            pdf.setFillColor(240, 240, 240);
            pdf.rect(15, y, pageWidth - 30, 8, 'F');
            pdf.setFontSize(7);
            
            const tableWidth = pageWidth - 30;
            const colWidthMarca = 30;
            const remainingWidth = tableWidth - colWidthMarca;
            const colWidthCategoria = remainingWidth / (todasCategorias.length + 2);
            
            let currentX = 15;
            const colPositions = {};
            
            pdf.text('MARCA', currentX + 2, y + 5);
            colPositions['marca'] = currentX;
            currentX += colWidthMarca;
            
            todasCategorias.forEach(cat => {
                pdf.text(cat.nome.toUpperCase(), currentX + 2, y + 5);
                colPositions[cat.key] = currentX;
                currentX += colWidthCategoria;
            });
            
            pdf.text('TOTAL', currentX + 2, y + 5);
            colPositions['total'] = currentX;
            currentX += colWidthCategoria;
            
            pdf.text('SHARE %', currentX + 2, y + 5);
            colPositions['pct'] = currentX;
            
            y += 10;

            const marcasOrdenadas = Object.entries(brandsData)
                .sort(([nomeA, dataA], [nomeB, dataB]) => {
                    if (nomeA.toUpperCase() === 'ELECTROLUX') return -1;
                    if (nomeB.toUpperCase() === 'ELECTROLUX') return 1;
                    return dataB.total - dataA.total;
                });

            marcasOrdenadas.forEach(([marca, data]) => {
                const isElectrolux = marca.toUpperCase() === 'ELECTROLUX';
                
                if (isElectrolux) {
                    pdf.setFillColor(230, 237, 245);
                    pdf.rect(15, y - 1, tableWidth, 7, 'F');
                    pdf.setFont('helvetica', 'bold');
                } else {
                    pdf.setFont('helvetica', 'normal');
                }

                pdf.text(marca.substring(0, 18), colPositions['marca'] + 2, y + 4);
                
                todasCategorias.forEach(cat => {
                    pdf.text((data[cat.key] || 0).toString(), colPositions[cat.key] + 2, y + 4);
                });
                
                pdf.text(data.total.toString(), colPositions['total'] + 2, y + 4);
                
                const pct = calcularPorcentagem(data.total, totais.totalGeral);
                pdf.text(`${pct}%`, colPositions['pct'] + 2, y + 4);
                
                y += 8;
            });

            y += 2;
            pdf.setLineWidth(0.5);
            pdf.line(15, y, pageWidth-15, y);
            y += 6;
            
            pdf.setFont('helvetica', 'bold');
            pdf.text('TOTAIS GERAIS', colPositions['marca'] + 2, y);
            
            todasCategorias.forEach(cat => {
                pdf.text((totais[cat.key] || 0).toString(), colPositions[cat.key] + 2, y);
            });
            
            pdf.text(totais.totalGeral.toString(), colPositions['total'] + 2, y);

            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(150, 150, 150);
            const bottomY = isLandscape ? 200 : 285;
            pdf.text(`Gerado em ${new Date().toLocaleString('pt-BR')}`, pageWidth/2, bottomY, { align: 'center' });

            pdf.save(`Floorshare_${dados.rede}.pdf`);
        }

        // Evento principal
        document.getElementById('generate-report').addEventListener('click', function() {
            const brandsData = coletarDadosMarcas();
            const totais = calcularTotais(brandsData);

            if (totais.totalGeral === 0) {
                alert("Adicione quantidades em pelo menos uma marca.");
                return;
            }

            const dados = {
                rede: document.getElementById('rede').value || "-",
                idRede: document.getElementById('id-rede').value || "-",
                filial: document.getElementById('filial').value || "-",
                cidade: document.getElementById('cidade').value || "-",
                data: formatarData(document.getElementById('data').value),
                observacoes: document.getElementById('observacoes').value
            };

            document.getElementById('visual-summary').innerHTML = gerarResumoVisual(brandsData, totais);

            const relatorioTexto = gerarRelatorioTexto(dados, brandsData, totais);
            document.getElementById('pdf-preview').textContent = relatorioTexto;
            document.getElementById('whatsapp-link').href = `https://wa.me/?text=${encodeURIComponent(relatorioTexto)}`;
            
            document.getElementById('generate-pdf').onclick = () => {
                gerarPDF(dados, brandsData, totais);
            };

            document.getElementById('result-modal').classList.remove('hidden');
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('result-modal').classList.add('hidden');
        });

        document.getElementById('reset-top').addEventListener('click', () => {
            if(confirm('Deseja limpar todos os dados?')) {
                document.location.reload();
            }
        });

        // Inicialização
        renderizarConfigCategorias();
        renderizarCategoriasElectrolux();
        document.getElementById('rede').focus();
    </script>
</body>
</html>
